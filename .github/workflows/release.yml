name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:  # 允许手动触发

permissions:
  id-token: write  #  Needed for OIDC token to publish to PyPI

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install pypa/build
      run: >-
        python -m
        pip install
        build
        --user

    - name: Build binary wheel and a source tarball
      run: python -m build --sdist --wheel --outdir dist/ .

    # PyPI 发布已暂时禁用，如需发布请配置 Trusted Publisher 或传统 Token
